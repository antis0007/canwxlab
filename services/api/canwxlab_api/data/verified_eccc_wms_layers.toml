# Curated ECCC GeoMet WMS built-in layers.
#
# Each entry is a *candidate* until the runtime verifies an exact-match
# against parsed GetCapabilities. No silent keyword fallback.
#
# `candidate_layer_names` MUST be the exact WMS Layer.Name(s) as published.
# At runtime the adapter compares (case-insensitively) against parsed
# capabilities. The first match wins; if none match, the layer is reported
# as `unavailable` with a clear diagnostic.
#
# `verified` is a documentation hint only: it indicates whether the candidate
# names have been confirmed against the GeoMet WMS at the time of editing.
# Runtime status is always derived from live capabilities, not from this flag.
#
# Confirmed against live GeoMet GetCapabilities on 2026-05-15
# (https://geo.weather.gc.ca/geomet?SERVICE=WMS&REQUEST=GetCapabilities&VERSION=1.3.0).

[[layer]]
id = "eccc_radar_1km_rrai"
title = "ECCC Radar — Rain Rate (1 km, RRAI)"
category = "radar"
intended_product_type = "radar"
candidate_layer_names = ["RADAR_1KM_RRAI"]
required_keywords = []
source = "eccc_geomet_wms"
attribution = "Environment and Climate Change Canada / Meteorological Service of Canada."
notes = "GeoMet national radar mosaic, 1 km, rain rate (RRAI)."
verified = true

