# Curated MSC GeoMet OGC API Features collections.
#
# Reference: https://eccc-msc.github.io/open-data/msc-geomet/readme_en/
#
# Each entry names a `collection_id` exactly as published by GeoMet. At
# runtime the adapter probes /collections and only treats an entry as
# available when its `collection_id` is present. Missing collections are
# reported as `unavailable` with a clear diagnostic. No keyword fallback.
#
# Adding a new GeoMet data stream is a TOML edit, not a code change.

# ── Public alerts and warnings ────────────────────────────────────────────

[[collection]]
id = "eccc_weather_alerts"
collection_id = "weather-alerts"
title = "ECCC Weather Alerts"
kind = "polygon"
variable = "alerts"
category = "alert"
unit = "category"
description = "Active ECCC public weather alert polygons (warnings, watches, statements)."
verified = true

