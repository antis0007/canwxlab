version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      CANWXLAB_ENV: development
      CANWXLAB_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - ./data:/app/data:ro

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_MAP_STYLE_URL: ""
    depends_on:
      - api

  worker:
    image: python:3.12-slim
    profiles: ["worker"]
    working_dir: /app
    volumes:
      - .:/app
    command: ["python", "-c", "print('CanWxLab worker placeholder: ingestion/simulation queue will live here')"]
